server:
  port: 6005

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/micro_db
    username: root
    password: Root@123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Enable Feign + Circuit Breaker integration
feign:
  circuitbreaker:
    enabled: true

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      car-rental-service:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
  timeout:
    instances:
      car-rental-service:
        timeout-duration: 3s

eureka:
  client:
    service-url:
      defaultZone: http://localhost:6002/eureka/
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 0.0
  health:
    circuitbreakers:
      enabled: true
