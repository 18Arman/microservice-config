server:
  port: 6000

spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true          # Auto-discover services from Eureka
          lower-case-service-id: true  # Use lowercase service names in URLs

      routes:
        # Route 1 — car-rental-service
        - id: car-rental-route
          uri: lb://car-rental-service   # lb = load balanced via Eureka
          predicates:
            - Path=/api/cars/**          # Any request to /api/cars/... goes here
          filters:
            - StripPrefix=0              # Don't strip any path prefix

        # Route 2 — passenger-service
        - id: passenger-route
          uri: lb://passenger-service
          predicates:
            - Path=/api/passengers/**
          filters:
            - StripPrefix=0

eureka:
  client:
    service-url:
      defaultZone: http://localhost:6002/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:6003/api/v2/spans
